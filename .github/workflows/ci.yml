name: CI

on:
  push:
    branches: [dev, main]
  pull_request:
    branches: [dev]
  merge_group:

jobs:
  lint:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[standalone,thirdparty,dev]"

      - name: Check formatting (isort)
        run: isort --check .

      - name: Check formatting (black)
        run: black --check .

      - name: Lint (pylint)
        run: |
          pylint src/gbserver/
          pylint src/gbcli/
          pylint src/gbcommon/

      - name: Type check (mypy)
        continue-on-error: true
        run: |
          mypy --disable-error-code=import-untyped --ignore-missing-imports src/gbserver/
          mypy --disable-error-code=import-untyped --ignore-missing-imports src/gbcli/
          mypy --disable-error-code=import-untyped --ignore-missing-imports src/gbcommon/

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[standalone,thirdparty,dev]"

      - name: Run tests (standalone + thirdparty)
        run: pytest -s test/ -m 'not ibm'

  demo-cpu:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[standalone,docker,dev]"

      - name: Build CPU test image
        run: |
          docker build -t gbserver-test-trl-unitxt:cpu \
            -f test-data/standalone-environments/docker/Dockerfile.cpu.test \
            test-data/standalone-environments/docker/

      - name: Run standalone demo (CPU)
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: bash scripts/demo-standalone.sh
