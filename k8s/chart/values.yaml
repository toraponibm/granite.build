# ----------------------------------------------
# IMPORTANT:
# - Set this to true when you want to setup a cluster where the build-watcher and rest-server are going to run
# - Set this to false when you want to setup a cluster where the workloads are going to run
generateResourcesForLLMBBackendCluster: true
# generateResourcesForLLMBBackendCluster: false
# ----------------------------------------------
configmaps:
  enable: false
  mainConfigMap:
    data:
      'build-watcher-config.yaml': |
        spaces:
        - name: public
deployments:
  enable: true
  # enable: false
  # image: us.icr.io/cil15-shared-registry/gb-prod/gbserver:commit-d5132ca4ddd7d5ba07b6ea26c9f811f03420a482
  image: us.icr.io/cil15-shared-registry/gb-prod/gbserver:latest
  imagePullSecrets:
  - all-icr-io-cil15-2
  buildWatcher:
    enable: true
    # enable: false
    replicas: 1
    resources:
      limits:
        cpu: "4"
        ephemeral-storage: 20Gi
        memory: 40Gi
      requests:
        cpu: "1"
        ephemeral-storage: 10Gi
        memory: 4Gi
    env:
      GB_ENVIRONMENT: PROD
      GBSERVER_DEFAULT_WORKSPACE_DIR: /tmp/build-watcher-workspace
      GBSERVER_SQL_SSLROOT_CERT: ibm-cloud-databases.cert
      DMF_CACHE: /tmp/dmf_cache
      GBSERVER_LINEAGE_PROVIDER: wandb
      GBSERVER_WANDB_BASE_URL: https://ibm.wandb.io
      GBSERVER_WANDB_PROJECT: lineage-tracking
    envFromMainSecret:
    - GBSERVER_SQL_USER
    - GBSERVER_SQL_PASSWD
    - GBSERVER_SQL_HOST
    - GBSERVER_SQL_PORT
    - GBSERVER_SQL_DBNAME
    - GBSERVER_SQL_SCHEMA
    - GBSERVER_SQL_ECHO
    - GBSERVER_METADATA_STORAGE
    - GBSERVER_DEFAULT_BUILDWATCHER_COMMITTER_NAME
    - GBSERVER_GITHUB_TOKEN
    - IBM_CLOUD_SECRETS_MANAGER_SERVICE_URL
    - IBM_CLOUD_API_KEY
    - LAKEHOUSE_TOKEN
    # Metrics ----------------
    - GBSERVER_METRICS_ENDPOINT
    - GBSERVER_METRICS_AUTH_TOKEN
    # Metrics ----------------
    # Node Health Alerting ---
    - GBSERVER_NODE_HEALTH_ALERT_WEBHOOK_URL
    - GBSERVER_NODE_HEALTH_ALERT_SLACK_WEBHOOK_URL
    - GBSERVER_NODE_HEALTH_ALERT_SLACK_CHANNEL
    - GBSERVER_NODE_HEALTH_ALERT_SLACK_MENTION_USERS
    # Node Health Alerting ---
    # OpenLineage / WandB ---
    - GBSERVER_WANDB_API_KEY
    - GBSERVER_WANDB_ENTITY
    # OpenLineage / WandB ---
  restServer:
    enable: true
    # enable: false
    replicas: 1
    port: 8080
    resources:
      limits:
        cpu: "4"
        memory: 6Gi
      requests:
        cpu: "4"
        memory: 4Gi
    env:
      DMF_CACHE: /tmp/dmf_cache
      GBSERVER_SQL_SSLROOT_CERT: ibm-cloud-databases.cert
      GBSERVER_REST_SERVER_WORKERS: "4"
      GBSERVER_AUTH_MODE: multi
      GBSERVER_LINEAGE_PROVIDER: wandb
      GBSERVER_WANDB_BASE_URL: https://ibm.wandb.io
      GBSERVER_WANDB_PROJECT: lineage-tracking
    envFromMainSecret:
    - GB_ENVIRONMENT
    - GBSERVER_SQL_USER
    - GBSERVER_SQL_PASSWD
    - GBSERVER_SQL_HOST
    - GBSERVER_SQL_PORT
    - GBSERVER_SQL_DBNAME
    - GBSERVER_SQL_SCHEMA
    - GBSERVER_SQL_ECHO
    - GBSERVER_METADATA_STORAGE
    - GBSERVER_GITHUB_TOKEN
    - IBM_CLOUD_SERVER_LOGS_API_KEY
    - IBM_CLOUD_SERVER_LOGS_API_URL
    - IBM_CLOUD_API_KEY
    - IBM_CLOUD_LOGS_API_KEY
    - IBM_CLOUD_LOGS_API_URL
    - IBM_CLOUD_SECRETS_MANAGER_SERVICE_URL
    - LAKEHOUSE_TOKEN
    - LAKEHOUSE_ENVIRONMENT
    - LAKEHOUSE_TOKEN_ARTIFACTS
    - GBSERVER_IBMID_CLIENT_ID
    - GBSERVER_IBMID_CLIENT_SECRET
    - GBSERVER_IBMID_CALLBACK_URL
    # OpenLineage / WandB ---
    - GBSERVER_WANDB_API_KEY
    - GBSERVER_WANDB_ENTITY
    # OpenLineage / WandB ---
ingresses:
  enable: true
  # enable: false
  host: granite-build-prod.bx.cloud9.ibm.com
pvcs:
  enable: true
  # enable: false
  buildWorkspace:
    enable: true
    # enable: false
